name: Build Hangman Mod JAR
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Gradle Wrapper JAR
        working-directory: hangman-mod
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://services.gradle.org/distributions/gradle-8.8-bin.zip" -o gradle.zip
          unzip -o gradle.zip
          find . -name "gradle-wrapper.jar" -exec cp {} gradle/wrapper/gradle-wrapper.jar \;
          rm -rf gradle.zip gradle-8.8

      - name: Build
        working-directory: hangman-mod
        run: chmod +x gradlew && ./gradlew build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: hangman-mod
          path: hangman-mod/build/libs/hangman-1.0.0.jar