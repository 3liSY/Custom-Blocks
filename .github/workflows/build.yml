name: Build Custom Blocks Ultimate v10

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Automatically sets up the wrapper so you don't have to curl it manually
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.8

      - name: Build Mod
        run: |
          chmod +x gradlew
          ./gradlew clean build --no-build-cache

      - name: List build outputs
        run: ls -la build/libs/

      - name: Upload Ultimate v10 JAR
        uses: actions/upload-artifact@v4
        with:
          name: Custom-Blocks-Ultimate-v10
          # Using a wildcard (*) ensures it finds the JAR even if the version numbers shift
          path: build/libs/Custom-Blocks-Ultimate-v10-*.jar