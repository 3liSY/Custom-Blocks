name: Build Mod JAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.8.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Build
        run: chmod +x gradlew && ./gradlew clean build --no-build-cache --rerun-tasks

      - name: List build outputs
        run: ls -la build/libs/

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: customblocks-mod
          path: build/libs/*.jar
