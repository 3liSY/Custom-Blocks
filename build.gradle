plugins {
    id 'fabric-loom' version '1.7.4'
    id 'maven-publish'
}

version = '10.0.0'
group = 'com.customblocks'

base {
    archivesName = 'Custom-Blocks-Ultimate-v10'
}

repositories {
    mavenCentral()
    maven { url 'https://maven.fabricmc.net/' }
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.1"
    mappings  "net.fabricmc:yarn:1.21.1+build.3:v2"
    modImplementation "net.fabricmc:fabric-loader:0.16.7"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.108.0+1.21.1"

    // TwelveMonkeys ImageIO - Optimized for Fabric 1.21.1
    // We use modImplementation + include so the JARs are bundled into your mod
    def tm_version = "3.12.0"
    
    include(modImplementation("com.twelvemonkeys.imageio:imageio-core:${tm_version}"))
    include(modImplementation("com.twelvemonkeys.imageio:imageio-webp:${tm_version}"))
    include(modImplementation("com.twelvemonkeys.imageio:imageio-gif:${tm_version}"))
    include(modImplementation("com.twelvemonkeys.imageio:imageio-jpeg:${tm_version}"))
    include(modImplementation("com.twelvemonkeys.imageio:imageio-bmp:${tm_version}"))
    include(modImplementation("com.twelvemonkeys.imageio:imageio-tiff:${tm_version}"))
    include(modImplementation("com.twelvemonkeys.common:common-lang:${tm_version}"))
    include(modImplementation("com.twelvemonkeys.common:common-io:${tm_version}"))
    include(modImplementation("com.twelvemonkeys.common:common-image:${tm_version}"))
}

processResources {
    filteringCharset 'UTF-8'
    inputs.property 'version', project.version
    filesMatching('fabric.mod.json') {
        expand 'version': project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.encoding = 'UTF-8'
    it.options.release = 21
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}